<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MAGINTEK — Software Development & IT Consulting | Surabaya</title>
<meta name="description" content="MAGINTEK — production-ready full-stack web, Flutter mobile apps, and IT consulting by Yowanda Frisky Amada. 37+ projects delivered across Indonesia.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- scroll progress -->
<div class="sbar" id="sbar" aria-hidden="true"></div>

<!-- decorative 3D scene background -->
<div class="scene-bg" aria-hidden="true">
  <span class="orb orb1"></span>
  <span class="orb orb2"></span>
  <span class="orb orb3"></span>
  <span class="grid-plane"></span>
</div>

<!-- NAV -->
<nav id="nav">
  <a href="#hero" class="logo">MAGIN<span class="ld"></span><span class="lb">TEK</span></a>
  <ul class="nl">
    <li><a href="#about">About</a></li>
    <li><a href="#services">Services</a></li>
    
    <li><a href="#portfolio">Portfolio</a></li>
    <li><a href="#catalog">Catalog</a></li>
    <li><a href="#writing">Writing</a></li>
    <li><a href="#experience">Experience</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
  <div class="nr">
    <a href="./assets/cv-mada-11-06-2026.pdf" target="_blank" rel="noopener noreferrer" class="btn-porto">📄 Curriculum Vitae</a>
    <button class="btn-hire" onclick="document.getElementById('contact').scrollIntoView({behavior:'smooth'})">Hire Us &rarr;</button>
  </div>
</nav>

<!-- SECTIONS: each container below is replaced by its own file from /sections at runtime -->
<div id="sec-hero"></div>
<div id="sec-about"></div>
<div id="sec-services"></div>
<div id="sec-stack"></div>

<div id="sec-portfolio"></div>
<div id="sec-portfolio-mobile"></div>
<div id="sec-catalog"></div>
<div id="sec-writing"></div>
<div id="sec-experience"></div>
<div id="sec-contact"></div>

<!-- DATA (defined before the app logic runs) -->
<script src="js/data-md.js"></script>
<script src="js/data-imgs.js"></script>

<!-- SECTION LOADER: fetch each fragment, inject it, then load the interaction layer -->
<script>
const SECTIONS = [
  'hero','about','services','stack','writing',
  'portfolio','portfolio-mobile','catalog','experience','contact'
];

Promise.all(SECTIONS.map(name =>
  fetch('sections/sec_' + name + '.html')
    .then(res => res.text())
    .then(html => {
      document.getElementById('sec-' + name).outerHTML = html;
    })
)).then(() => {
  // Sections are now in the DOM — load app.js, which wires up nav,
  // filters, the lightbox modal, reveal animations, and the 3D tilt/parallax.
  const s = document.createElement('script');
  s.src = 'js/app.js';
  document.body.appendChild(s);
}).catch(err => console.error('Section load failed:', err));
</script>

</body>
</html>
